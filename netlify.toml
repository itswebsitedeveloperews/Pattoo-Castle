[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  CONTENTFUL_SPACE_ID = "t14u7man7wab"
  CONTENTFUL_ENVIRONMENT = "master"
  CONTENTFUL_HOME_PAGE_CONTENT_TYPE = "homePage"
  CONTENTFUL_FOOTER_CONTENT_TYPE = "footer"
  CONTENTFUL_HEADER_CONTENT_TYPE = "header"
  CONTENTFUL_ABOUT_CONTENT_TYPE = "about"
  CONTENTFUL_OVERVIEW_CONTENT_TYPE = "overview"
  CONTENTFUL_ACCOMMODATION_CONTENT_TYPE = "accommodation"
  CONTENTFUL_GALLERY_CONTENT_TYPE = "gallery"
  CONTENTFUL_LOCATION_CONTENT_TYPE = "location"
  CONTENTFUL_EVENT_CONTENT_TYPE = "event"

# Set CONTENTFUL_ACCESS_TOKEN in Netlify:
# Site settings > Environment variables > Add variable
# Do not commit the token here.

[[plugins]]
  package = "@netlify/plugin-nextjs"
